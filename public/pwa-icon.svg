<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <linearGradient id="neon-lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#84cc16" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Smooth background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-glow)" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="#334155" stroke-width="4" />
  
  <!-- Outer TV shell -->
  <g transform="translate(106, 110)" filter="url(#glow)">
    <!-- Antenna -->
    <path d="M120 40 L150 -10 M180 40 L150 -10" stroke="url(#neon-lime)" stroke-width="10" stroke-linecap="round" />
    <circle cx="150" cy="-10" r="14" fill="url(#neon-lime)" />
    
    <!-- TV body -->
    <rect x="10" y="40" width="280" height="200" rx="36" fill="#1e293b" stroke="#475569" stroke-width="8" />
    <!-- Screen bezel -->
    <rect x="24" y="54" width="252" height="172" rx="22" fill="#020617" stroke="url(#neon-lime)" stroke-width="4" />
    
    <!-- Play Triangle -->
    <polygon points="135,105 135,175 190,140" fill="url(#neon-lime)" />
    
    <!-- Stand -->
    <path d="M110 240 L190 240 L150 270 Z" fill="#334155" />
    <rect x="120" y="260" width="60" height="12" rx="6" fill="#475569" />
  </g>
</svg>
